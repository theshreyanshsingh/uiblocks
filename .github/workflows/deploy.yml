name: UIblocks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Latest Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure the project directory exists
            if [ ! -d "/home/${{ secrets.SERVER_USER }}/uiblocks" ]; then
              echo "📁 Directory not found! Cloning repository..."
              git clone https://github.com/theshreyanshsingh/uiblocks.git /home/${{ secrets.SERVER_USER }}/uiblocks
            fi

            # Navigate to the project
            cd /home/${{ secrets.SERVER_USER }}/uiblocks

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm install

            # Build the project
            npm run build

            # Restart the app using PM2
            pm2 restart uiblocks || pm2 start npm --name "uiblocks" -- start

            # Save PM2 process list (so it auto-starts after reboot)
            pm2 save
